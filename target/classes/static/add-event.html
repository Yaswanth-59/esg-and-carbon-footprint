<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add ESG Activity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
}

body {
    background: linear-gradient(135deg, #c8facc, #e8fff0);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

/* Glass Card */
.form-container {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 35px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 20px 50px rgba(0, 100, 0, 0.2);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    text-align: center;
    color: #2e7d32;
    margin-bottom: 25px;
    font-size: 2rem;
}

/* Inputs */
form input,
form textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-bottom: 18px;
    font-size: 1rem;
    background: #ffffffcc;
    box-shadow: 0 4px 12px rgba(0, 128, 0, 0.1);
    transition: 0.3s;
}

form input:focus,
form textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px #66bb6a;
}

textarea {
    min-height: 90px;
    resize: vertical;
}

/* Map */
#map {
    height: 280px;
    border-radius: 15px;
    margin-bottom: 20px;
    border: 4px solid white;
    box-shadow: 0 10px 25px rgba(0, 100, 0, 0.2);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #43a047, #2e7d32);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    background: linear-gradient(135deg, #2e7d32, #1b5e20);
}

/* Back button */
.back-btn {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #2e7d32;
    text-decoration: none;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="form-container">
    <form id="eventForm">
        <h2>🌍 Add ESG Activity</h2>

        <input type="text" id="title" placeholder="Event Title" required>
        <textarea id="description" placeholder="Event Description" required></textarea>
        <input type="text" id="location" placeholder="Event Location" required>
        <input type="datetime-local" id="eventDate" required>
        <input type="email" id="organizerEmail" placeholder="Organizer Email" required>

        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">

        <div id="map"></div>

        <button type="submit">Submit Event</button>
        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
    </form>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let marker;

map.on('click', function(e) {
    const { lat, lng } = e.latlng;
    document.getElementById('latitude').value = lat;
    document.getElementById('longitude').value = lng;

    if (marker) {
        marker.setLatLng(e.latlng);
    } else {
        marker = L.marker(e.latlng).addTo(map);
    }
});

document.getElementById('eventForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const eventData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        location: document.getElementById('location').value,
        eventDate: document.getElementById('eventDate').value,
        organizerEmail: document.getElementById('organizerEmail').value,
        latitude: parseFloat(document.getElementById('latitude').value),
        longitude: parseFloat(document.getElementById('longitude').value)
    };

    try {
        const res = await fetch('/api/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(eventData)
        });

        if (res.ok) {
            alert('🎉 Event added successfully!');
            window.location.href = '/dashboard';
        } else {
            alert('❌ Error adding event.');
        }
    } catch (err) {
        alert('⚠️ Server error.');
        console.error(err);
    }
});
</script>

</body>
</html>
