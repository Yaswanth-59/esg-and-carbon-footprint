<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESG History</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}
.navbar {
    background: linear-gradient(90deg, #1b5e20, #2e7d32);
}
.navbar-brand, .nav-link {
    color: white !important;
}
.card {
    border-radius: 15px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">🌍 ESG Dashboard</a>
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/history">History</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- FILTER SECTION -->
    <div class="card p-3 shadow mb-4">
        <form method="get" action="/history" class="row g-3">
            <div class="col-md-3">
                <label>Start Date</label>
                <input type="date" name="startDate" class="form-control">
            </div>
            <div class="col-md-3">
                <label>End Date</label>
                <input type="date" name="endDate" class="form-control">
            </div>
            <div class="col-md-3">
                <label>User Email</label>
                <input type="text" name="email" class="form-control" placeholder="optional">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-success w-100">Apply Filter</button>
            </div>
        </form>
    </div>

    <!-- CHARTS -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h5>Environmental Trend</h5>
                <canvas id="envChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow">
                <h5>Social vs Governance</h5>
                <canvas id="sgChart"></canvas>
            </div>
        </div>
    </div>

 <!-- Environmental Table -->
<div class="card p-4 shadow mb-4">
    <h4>Environmental History</h4>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Electricity</th>
                <th>Transport</th>
                <th>Food</th>
                <th>Waste</th>
                <th>Eco Score</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${envList}">
                <td th:text="${e.electricity}"></td>
                <td th:text="${e.transport}"></td>
                <td th:text="${e.food}"></td>
                <td th:text="${e.waste}"></td>
                <td th:text="${e.ecoScore}"></td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Social History -->
<div class="card p-4 shadow mb-4">
    <h4>Social History</h4>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Employees</th>
                <th>Safety</th>
                <th>Training</th>
                <th>Community</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${socialList}">
                <td th:text="${s.employees}"></td>
                <td th:text="${s.safety}"></td>
                <td th:text="${s.training}"></td>
                <td th:text="${s.community}"></td>
                <td th:text="${s.score}"></td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Governance History -->
<div class="card p-4 shadow">
    <h4>Governance History</h4>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Compliance</th>
                <th>Audit</th>
                <th>Policy</th>
                <th>Diversity</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="g : ${govList}">
                <td th:text="${g.compliance}"></td>
                <td th:text="${g.audit}"></td>
                <td th:text="${g.policy}"></td>
                <td th:text="${g.diversity}"></td>
                <td th:text="${g.score}"></td>
            </tr>
        </tbody>
    </table>
</div>

</div> <!-- CLOSE container only once here -->



<script th:inline="javascript">
const envData = /*[[${envList}]]*/ [];
const socialData = /*[[${socialList}]]*/ [];
const govData = /*[[${govList}]]*/ [];

// Environmental Trend
new Chart(document.getElementById('envChart'), {
    type: 'line',
    data: {
        labels: envData.map((_, i) => 'Entry ' + (i + 1)),
        datasets: [{
            label: 'Eco Score',
            data: envData.map(e => e.ecoScore),
            borderColor: '#198754',
            backgroundColor: 'rgba(25,135,84,0.2)',
            fill: true
        }]
    }
});

// Social vs Governance
new Chart(document.getElementById('sgChart'), {
    type: 'bar',
    data: {
        labels: ['Social', 'Governance'],
        datasets: [{
            data: [
                socialData.length ? socialData[socialData.length-1].score : 0,
                govData.length ? govData[govData.length-1].score : 0
            ],
            backgroundColor: ['#42a5f5', '#ab47bc']
        }]
    }
});
</script>

</body>
</html>
