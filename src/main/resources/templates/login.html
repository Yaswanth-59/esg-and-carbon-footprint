<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carbon Footprint | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Boxicons -->
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4EA685;
    --secondary: #57B894;
    --white: #fff;
    --gray: #efefef;
}

* {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #4EA685, #57B894);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    width: 900px;
    height: 550px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* Forms */
.form-container {
    position: absolute;
    top: 0;
    height: 100%;
    width: 50%;
    transition: 0.6s ease-in-out;
}

.sign-in-container {
    left: 0;
    z-index: 2;
}

.sign-up-container {
    left: 0;
    opacity: 0;
    z-index: 1;
}

/* Active state */
.container.active .sign-in-container {
    transform: translateX(100%);
}

.container.active .sign-up-container {
    transform: translateX(100%);
    opacity: 1;
    z-index: 5;
}

/* Form styling */
form {
    background: white;
    display: flex;
    flex-direction: column;
    padding: 60px;
    height: 100%;
    justify-content: center;
}

form h2 {
    margin-bottom: 20px;
}

.input-group {
    margin: 10px 0;
    position: relative;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: var(--gray);
}

button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: var(--secondary);
}

/* Overlay */
.overlay-container {
    position: absolute;
    top: 0;
    left: 50%;
    width: 50%;
    height: 100%;
    overflow: hidden;
    transition: transform 0.6s ease-in-out;
    z-index: 100;
}

.container.active .overlay-container {
    transform: translateX(-100%);
}

.overlay {
    background: linear-gradient(135deg, #4EA685, #57B894);
    color: white;
    position: relative;
    left: -100%;
    width: 200%;
    height: 100%;
    transform: translateX(0);
    transition: transform 0.6s ease-in-out;
}

.container.active .overlay {
    transform: translateX(50%);
}

.overlay-panel {
    position: absolute;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
}

.overlay-left {
    transform: translateX(-20%);
}

.container.active .overlay-left {
    transform: translateX(0);
}

.overlay-right {
    right: 0;
}

.container.active .overlay-right {
    transform: translateX(20%);
}

.switch-btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: 2px solid white;
    background: transparent;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* Popup */
.popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2ecc71;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    opacity: 0;
    transition: 0.5s;
}

.popup.show {
    opacity: 1;
}
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 6px 12px;
    background: white;
    color: #4EA685;
    border-radius: 20px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.back-btn:hover {
    background: #f0f0f0;
}

</style>
</head>

<body>
    <a href="/" class="back-btn">← Home</a>


<div class="popup" id="popup">Signup Successful! Please login.</div>

<div class="container" id="container">

    <!-- Sign Up -->
    <div class="form-container sign-up-container">
        <form action="/signup" method="post">
            <h2>Create Account</h2>
            <div class="input-group">
                <input type="text" name="email" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password">
            </div>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <!-- Sign In -->
    <div class="form-container sign-in-container">
        <form action="/login" method="post">
            <h2>Sign in</h2>
            <div class="input-group">
                <input type="text" name="email" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password">
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>


    <!-- Overlay -->
    <div class="overlay-container">
        <div class="overlay">

            <div class="overlay-panel overlay-left">
                <h2>Welcome Back!</h2>
                <p>Login to continue your carbon tracking journey.</p>
                <button class="switch-btn" onclick="toggle()">Sign In</button>
            </div>

            <div class="overlay-panel overlay-right">
                <h2>Hello, Friend!</h2>
                <p>Start tracking your carbon footprint today.</p>
                <button class="switch-btn" onclick="toggle()">Sign Up</button>
            </div>

        </div>
    </div>
</div>

<script>
function toggle() {
    document.getElementById("container").classList.toggle("active");
}

/* Signup success popup */
const params = new URLSearchParams(window.location.search);
if (params.has("signupSuccess")) {
    const popup = document.getElementById("popup");
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 3000);
}
</script>

</body>
</html>
