<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #f3e5f5, #ede7f6);
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: linear-gradient(90deg, #6a1b9a, #8e24aa);
}

.navbar-brand, .nav-link {
    color: white !important;
}

.card {
    border-radius: 18px;
    border: none;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.btn-primary {
    background: linear-gradient(90deg, #6a1b9a, #8e24aa);
    border: none;
}

.footer {
    background: linear-gradient(90deg, #6a1b9a, #8e24aa);
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">🌍 ESG Dashboard</a>

        <a class="nav-link" href="/environmental">Environmental</a>
        <a class="nav-link" href="/social">Social</a>
        <a class="nav-link" href="/governance">Governance</a>
        <a class="nav-link" href="/esg">ESG Score</a>

        <a class="nav-link ms-3" href="/logout">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Social Form -->
    <div class="card p-4 shadow">
        <h4 class="text-center mb-3">Social Impact Dashboard</h4>

        <form action="/social-submit" method="post">

            <div class="mb-3">
                <label>Employee Count</label>
                <input type="number" name="employees" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Safety Incidents (per month)</label>
                <input type="number" name="safety" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Training Hours (per employee)</label>
                <input type="number" name="training" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Community Contribution (₹ per month)</label>
                <input type="number" name="community" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Submit Social Data</button>
        </form>
    </div>

    <!-- Social Score Display -->
    <div class="card p-3 shadow mt-4 text-center" th:if="${socialScore != null}">
        <h5>
            Social Score:
            <span style="color:green" th:text="${socialScore} + '%'"></span>
        </h5>
    </div>

</div>

<footer class="footer">
    <p>© 2026 ESG Sustainability Project | Social Module</p>
</footer>

</body>
</html>
