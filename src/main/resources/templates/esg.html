<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESG Score</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #e8f5e9, #e3f2fd);
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: linear-gradient(90deg, #2e7d32, #1976d2);
}

.navbar-brand, .nav-link {
    color: white !important;
}

.card {
    border-radius: 18px;
    border: none;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.footer {
    background: linear-gradient(90deg, #2e7d32, #1976d2);
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">🌍 ESG Dashboard</a>

        <a class="nav-link" href="/environmental">Environmental</a>
        <a class="nav-link" href="/social">Social</a>
        <a class="nav-link" href="/governance">Governance</a>
        <a class="nav-link" href="/esg">ESG Score</a>

        <a class="nav-link ms-3" href="/logout">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card p-4 shadow text-center">
        <h3 class="mb-4">Overall ESG Score</h3>

        <h5>
            Environmental Score:
            <span th:text="${environmentalScore} + '%'">0%</span>
        </h5>

        <h5>
            Social Score:
            <span th:text="${socialScore} + '%'">0%</span>
        </h5>

        <h5>
            Governance Score:
            <span th:text="${governanceScore} + '%'">0%</span>
        </h5>

        <hr>

        <h2>
            Final ESG Score:
            <span style="color:green" th:text="${esgScore} + '%'">0%</span>
        </h2>
    </div>

</div>

<footer class="footer">
    <p>© 2026 ESG Sustainability Project | Overall ESG Score</p>
</footer>

</body>
</html>
