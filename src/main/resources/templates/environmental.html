<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Environmental Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: linear-gradient(90deg, #2e7d32, #43a047);
}

.navbar-brand, .nav-link {
    color: white !important;
}

.card {
    border-radius: 18px;
    border: none;
}

.btn-success {
    background: linear-gradient(90deg, #2e7d32, #43a047);
    border: none;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">🌍 ESG Dashboard</a>

        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/environmental">Environmental</a>
        <a class="nav-link" href="/social">Social</a>
        <a class="nav-link" href="/governance">Governance</a>
        <a class="nav-link" href="/esg">ESG Score</a>

        <a class="nav-link ms-3" href="/logout">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card p-4 shadow">
        <h4 class="text-center mb-3">Environmental Carbon Calculator</h4>

        <form action="/calculate" method="post">

            <div class="mb-3">
                <label>Electricity (kWh/month)</label>
                <input type="number" name="electricity" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Transport (km/month)</label>
                <input type="number" name="transport" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Meat meals per week</label>
                <input type="number" name="food" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Waste generated (kg/week)</label>
                <input type="number" name="waste" class="form-control" required>
            </div>

            <button class="btn btn-success w-100">Calculate</button>
        </form>
    </div>
</div>

</body>
</html>
