<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Governance Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #e3f2fd, #e1f5fe);
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: linear-gradient(90deg, #0d47a1, #1976d2);
}

.navbar-brand, .nav-link {
    color: white !important;
}

.card {
    border-radius: 18px;
    border: none;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.btn-primary {
    background: linear-gradient(90deg, #0d47a1, #1976d2);
    border: none;
}

.footer {
    background: linear-gradient(90deg, #0d47a1, #1976d2);
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">🌍 ESG Dashboard</a>

        <a class="nav-link" href="/environmental">Environmental</a>
        <a class="nav-link" href="/social">Social</a>
        <a class="nav-link" href="/governance">Governance</a>
        <a class="nav-link" href="/esg">ESG Score</a>

        <a class="nav-link ms-3" href="/logout">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Governance Form -->
    <div class="card p-4 shadow">
        <h4 class="text-center mb-3">Governance Dashboard</h4>

        <form action="/governance-submit" method="post">

            <div class="mb-3">
                <label>Compliance Score (0–100)</label>
                <input type="number" name="compliance" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Audit Issues (per year)</label>
                <input type="number" name="audit" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Policy Updates (per year)</label>
                <input type="number" name="policy" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Board Diversity Score (0–100)</label>
                <input type="number" name="diversity" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Submit Governance Data</button>
        </form>
    </div>

    <!-- Governance Score Display -->
    <div class="card p-3 shadow mt-4 text-center" th:if="${governanceScore != null}">
        <h5>
            Governance Score:
            <span style="color:green" th:text="${governanceScore} + '%'"></span>
        </h5>
    </div>

</div>

<footer class="footer">
    <p>© 2026 ESG Sustainability Project | Governance Module</p>
</footer>

</body>
</html>
