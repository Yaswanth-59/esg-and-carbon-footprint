<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESG Activity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #e6ffe6, #f5fff5);
    margin: 0;
    padding: 30px;
}

h1 {
    text-align: center;
    color: #2e7d32;
    margin-bottom: 30px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.event-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.event-card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,100,0,0.15);
    transition: 0.3s;
}

.event-card:hover {
    transform: translateY(-6px);
}

.event-title {
    font-size: 1.3rem;
    color: #2e7d32;
    font-weight: 600;
    margin-bottom: 10px;
}

.event-desc {
    color: #444;
    margin-bottom: 10px;
}

.event-info {
    font-size: 0.9rem;
    color: #666;
}

.back-btn {
    display: block;
    margin: 30px auto;
    width: 200px;
    text-align: center;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 500;
}
</style>
</head>

<body>

<h1>🌍 Upcoming ESG Activity</h1>

<div class="container">
    <div id="eventList" class="event-grid"></div>

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
</div>

<script>
async function loadEvents() {
    try {
        const res = await fetch('/api/events');
        const events = await res.json();

        const container = document.getElementById('eventList');

        if (events.length === 0) {
            container.innerHTML = "<p>No events available.</p>";
            return;
        }

        events.forEach(event => {
            container.innerHTML += `
                <div class="event-card">
                    <div class="event-title">${event.title}</div>
                    <div class="event-desc">${event.description}</div>
                    <div class="event-info">
                        📍 ${event.location}<br>
                        📅 ${new Date(event.eventDate).toLocaleString()}<br>
                        👤 ${event.organizerEmail}
                    </div>
                </div>
            `;
        });
    } catch (err) {
        console.error(err);
        document.getElementById('eventList').innerHTML =
            "<p>Error loading events.</p>";
    }
}

loadEvents();
</script>

</body>
</html>
